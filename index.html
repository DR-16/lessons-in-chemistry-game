<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lessons in Chemistry — A Choice Story</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #070d07;
  --panel: #0e180e;
  --border: #3a8a3a;
  --text: #c8e898;
  --amber: #f0a800;
  --teal: #20967a;
  --dim: #4a7a4a;
  --glow: rgba(56,136,56,0.25);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'VT323', 'Courier New', monospace;
  font-size: 20px;
  line-height: 1.55;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* CRT scanlines */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0.09) 0px, rgba(0,0,0,0.09) 1px,
    transparent 1px, transparent 3px
  );
  pointer-events: none;
  z-index: 900;
}

/* CRT vignette */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.75) 100%);
  pointer-events: none;
  z-index: 901;
}

/* ── TITLE SCREEN ── */
#title-screen {
  position: fixed; inset: 0;
  background: #040804;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 500;
  padding: 20px;
}

.title-flask {
  font-size: 52px;
  margin-bottom: 8px;
  filter: drop-shadow(0 0 12px rgba(56,200,80,0.5));
  animation: flask-glow 3s ease-in-out infinite;
}
@keyframes flask-glow {
  0%,100% { filter: drop-shadow(0 0 8px rgba(56,200,80,0.4)); }
  50%      { filter: drop-shadow(0 0 22px rgba(56,200,80,0.9)); }
}

.title-year {
  font-family: 'VT323', monospace;
  font-size: 16px;
  color: var(--dim);
  letter-spacing: 8px;
  margin-bottom: 14px;
}

#title-main {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(12px, 2.8vw, 22px);
  color: var(--amber);
  text-shadow: 0 0 24px rgba(240,168,0,0.7), 0 0 50px rgba(240,168,0,0.2);
  text-align: center;
  line-height: 1.8;
  letter-spacing: 3px;
}

#title-sub {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(6px, 1.2vw, 9px);
  color: var(--teal);
  text-align: center;
  margin: 8px 0 4px;
  letter-spacing: 3px;
  opacity: 0.8;
}

.title-author {
  font-family: 'VT323', monospace;
  font-size: 18px;
  color: var(--dim);
  letter-spacing: 5px;
  margin: 6px 0 24px;
}

hr.title-divider {
  width: 200px;
  border: none;
  border-top: 1px solid #1a3a1a;
  margin: 0 0 24px;
}

@keyframes pulse-btn {
  0%,100% { opacity:1; box-shadow: 0 0 8px rgba(240,168,0,0.4); }
  50%      { opacity:0.7; box-shadow: 0 0 20px rgba(240,168,0,0.9); }
}

#start-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 11px;
  background: transparent;
  border: 2px solid var(--amber);
  color: var(--amber);
  padding: 14px 32px;
  cursor: pointer;
  letter-spacing: 3px;
  animation: pulse-btn 2.2s ease-in-out infinite;
  margin-bottom: 16px;
  transition: background 0.2s;
}
#start-btn:hover { background: rgba(240,168,0,0.1); }

.title-note {
  font-family: 'VT323', monospace;
  font-size: 17px;
  color: #3a5a3a;
  text-align: center;
  line-height: 2;
}

/* ── GAME CONTAINER ── */
#game {
  width: min(820px, 100vw);
  background: var(--panel);
  border: 3px solid var(--border);
  box-shadow: 0 0 30px var(--glow), 0 0 60px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.4);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  max-height: 100vh;
  overflow: hidden;
  image-rendering: pixelated;
}

/* ── HEADER ── */
#header {
  background: #070f07;
  border-bottom: 2px solid #1e4a1e;
  padding: 8px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}

.game-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  color: var(--amber);
  text-shadow: 0 0 8px rgba(240,168,0,0.5);
  letter-spacing: 2px;
}

#progress-bar { display: flex; gap: 3px; align-items: center; }

.pdot {
  width: 7px; height: 7px;
  background: #1a3a1a;
  border: 1px solid #2a5a2a;
  transition: background 0.3s, box-shadow 0.3s;
}
.pdot.on {
  background: var(--amber);
  box-shadow: 0 0 4px rgba(240,168,0,0.7);
  border-color: var(--amber);
}

/* ── SCENE ART ── */
#scene-art {
  height: 185px;
  position: relative;
  overflow: hidden;
  border-bottom: 2px solid #1a3a1a;
  flex-shrink: 0;
  transition: background 0.8s;
}

.bg-lab    { background: linear-gradient(170deg,#030d08 0%,#071a0e 60%,#030d08 100%); }
.bg-home   { background: linear-gradient(170deg,#0d0805 0%,#1a1005 60%,#0d0805 100%); }
.bg-tv     { background: linear-gradient(170deg,#050510 0%,#0a0518 60%,#050510 100%); }
.bg-outside{ background: linear-gradient(170deg,#040c14 0%,#07101e 60%,#040c14 100%); }
.bg-dark   { background: linear-gradient(170deg,#020202 0%,#050505 100%); }
.bg-warm   { background: linear-gradient(170deg,#140804 0%,#1e1008 60%,#140804 100%); }

#act-label {
  position: absolute;
  top: 7px; left: 12px;
  font-family: 'Press Start 2P', monospace;
  font-size: 6px;
  color: var(--teal);
  letter-spacing: 1px;
  opacity: 0.8;
}

#scene-art-inner {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
}

.art-pre {
  font-family: 'VT323', monospace;
  font-size: 13px;
  color: var(--text);
  line-height: 1.15;
  white-space: pre;
  text-shadow: 0 0 5px currentColor;
  opacity: 0.85;
}

#scene-title {
  position: absolute;
  bottom: 7px; left: 0; right: 0;
  text-align: center;
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  color: var(--amber);
  text-shadow: 0 0 8px rgba(240,168,0,0.6);
  letter-spacing: 1px;
}

/* ── TEXT AREA ── */
#text-wrap {
  flex: 1; overflow: hidden;
  display: flex; flex-direction: column; min-height: 0;
}

#text-area {
  padding: 16px 22px 10px;
  overflow-y: auto; flex: 1; min-height: 0;
}
#text-area::-webkit-scrollbar { width: 5px; }
#text-area::-webkit-scrollbar-track { background: #070f07; }
#text-area::-webkit-scrollbar-thumb { background: #2a5a2a; }

#speaker {
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  color: var(--teal);
  margin-bottom: 9px;
  letter-spacing: 1px;
  min-height: 14px;
}

#narrative-text { font-size: 20px; line-height: 1.62; color: var(--text); }

.hl  { color: var(--amber); }
.em  { color: #aad878; font-style: italic; }
.str { color: #e8f8c0; }

/* ── CHOICES ── */
#choices-area {
  padding: 12px 20px 16px;
  display: grid; gap: 9px;
  flex-shrink: 0;
  border-top: 1px solid #162a16;
}

.choice-btn {
  background: #070f07;
  border: 2px solid var(--border);
  color: var(--text);
  padding: 11px 15px;
  font-family: 'VT323', monospace;
  font-size: 19px;
  cursor: pointer;
  text-align: left;
  display: flex; align-items: flex-start; gap: 10px;
  transition: background 0.1s, border-color 0.1s, transform 0.1s, box-shadow 0.1s;
  line-height: 1.4;
}
.choice-btn .arrow {
  color: var(--border); font-size: 13px; margin-top: 2px;
  flex-shrink: 0; transition: color 0.1s;
}
.choice-btn:hover {
  background: #102010; border-color: var(--amber); color: #fff;
  transform: translateX(3px);
  box-shadow: 0 0 12px rgba(240,168,0,0.25), inset 0 0 8px rgba(240,168,0,0.08);
}
.choice-btn:hover .arrow { color: var(--amber); }
.choice-btn:active { transform: translateX(5px); }

/* ── STATUS BAR ── */
#status-bar {
  background: #040c04; border-top: 1px solid #162a16;
  padding: 5px 16px;
  display: flex; justify-content: space-between;
  font-size: 14px; color: #2a5a2a; flex-shrink: 0;
}

/* ── ANIMATIONS ── */
@keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
.fade-in { animation: fadeIn 0.35s ease both; }

@keyframes flash-in {
  0%   { opacity:0; background:#203a20; }
  30%  { opacity:1; background:#102010; }
  100% { background:#070f07; }
}
.flash { animation: flash-in 0.4s ease both; }

/* ══════════════════════════════════════
   INTERACTIVE EFFECTS
   ══════════════════════════════════════ */

/* ── Red death veil ── */
#red-veil {
  position: fixed; inset: 0;
  background: rgba(140, 8, 8, 0);
  pointer-events: none;
  z-index: 902;
  transition: background 0.7s ease, box-shadow 0.7s ease;
  box-shadow: inset 0 0 0px rgba(255,0,0,0);
}
#red-veil.on {
  background: rgba(180, 12, 12, 0.52);
  box-shadow: inset 0 0 120px rgba(255,0,0,0.5),
              inset 0 0 40px rgba(200,0,0,0.6);
}
#red-veil.pulse {
  animation: red-pulse 1.8s ease-in-out 2s 3;
}
@keyframes red-pulse {
  0%,100% { box-shadow: inset 0 0 120px rgba(255,0,0,0.5), inset 0 0 40px rgba(200,0,0,0.6); }
  50%      { box-shadow: inset 0 0 200px rgba(255,0,0,0.8), inset 0 0 80px rgba(255,0,0,0.9); }
}

/* ── Flying papers ── */
#fx-layer {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 950;
  overflow: visible;
}

.paper {
  position: fixed;
  font-family: 'VT323', monospace;
  font-size: 12px;
  line-height: 1.2;
  color: #c8e898;
  white-space: pre;
  background: #0a1a0a;
  border: 1px solid #3a8a3a;
  padding: 4px 6px;
  box-shadow: 0 0 8px rgba(56,160,56,0.5);
  will-change: transform, opacity;
  left: 0; top: 0;
}

/* Screen shake when papers hit */
@keyframes shake {
  0%,100% { transform: translate(0,0); }
  15%  { transform: translate(-4px, 3px); }
  30%  { transform: translate(5px,-3px); }
  45%  { transform: translate(-3px, 5px); }
  60%  { transform: translate(4px,-2px); }
  75%  { transform: translate(-2px, 4px); }
  90%  { transform: translate(3px,-3px); }
}
.shaking { animation: shake 0.45s ease both; }

/* ── Tears ── */
.tear {
  position: fixed;
  width: 5px;
  border-radius: 2px 2px 50% 50%;
  background: linear-gradient(180deg,
    rgba(140,200,255,0.95) 0%,
    rgba(80,160,255,0.55)  100%);
  box-shadow: 0 0 4px rgba(100,180,255,0.6);
  pointer-events: none;
  will-change: transform, opacity;
  left: 0; top: 0;
}
/* Subtle blue tint on tell_truth scene */
#game.scene-tears {
  box-shadow: 0 0 30px var(--glow),
              0 0 60px rgba(0,0,0,0.5),
              0 0 50px rgba(60,120,220,0.15),
              inset 0 0 20px rgba(0,0,0,0.4);
  transition: box-shadow 1.5s ease;
}
</style>
</head>

// ══════════════════════════════════════════════════════════════
// GAME STATE
// ══════════════════════════════════════════════════════════════
const S = {
  scene: null,
  count: 0,
  flags: {},
  history: [],
  typing: false,
  timer: null,
};


// ══════════════════════════════════════════════════════════════
// ENGINE
// ══════════════════════════════════════════════════════════════
function startGame() {
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('game').style.display = 'flex';
  goScene('start');
}

function goScene(id) {
  const sc = SCENES[id];
  if (!sc) { console.error('Missing scene:', id); return; }
  if (sc.__end) { showEnding(sc.__end); return; }

  S.scene = id;
  S.count++;

  // Clear previous fx elements; then trigger scene effect
  document.getElementById('fx-layer').innerHTML = '';
  document.getElementById('game').classList.remove('scene-tears');
  triggerEffect(id);
  if (sc.flag) Object.assign(S.flags, sc.flag);

  // Background
  const artEl = document.getElementById('scene-art');
  artEl.className = sc.bg || 'bg-dark';

  // ASCII art
  const pre = document.createElement('pre');
  pre.className = 'art-pre';
  pre.textContent = ARTS[sc.art] || '';
  const inner = document.getElementById('scene-art-inner');
  inner.innerHTML = '';
  inner.appendChild(pre);

  // Labels
  document.getElementById('act-label').textContent = sc.act || '';
  document.getElementById('scene-title').textContent = sc.title || '';
  document.getElementById('speaker').textContent = sc.speaker || '';

  // Reset choices
  document.getElementById('choices-area').innerHTML = '';

  // Update HUD
  updateProgress();
  updatePath();
  document.getElementById('scene-counter').textContent = 'Scene ' + S.count;

  // Typewrite text
  typeText(document.getElementById('narrative-text'), sc.text || '', () => {
    renderChoices(sc.choices || []);
  });
}

// ── Typewriter effect ──
function typeText(el, html, done) {
  if (S.timer) clearTimeout(S.timer);
  S.typing = true;
  el.innerHTML = '';

  const parts = html.split('<br><br>');
  let built = '';
  let i = 0;

  function next() {
    if (i >= parts.length) {
      S.typing = false;
      if (done) done();
      return;
    }
    built += (i > 0 ? '<br><br>' : '') + parts[i];
    el.innerHTML = built;
    el.parentElement.scrollTop = el.parentElement.scrollHeight;
    const charCount = parts[i].replace(/<[^>]*>/g, '').length;
    const delay = Math.min(400 + charCount * 22, 2200);
    i++;
    S.timer = setTimeout(next, delay);
  }
  next();
}

function skipTyping() {
  if (!S.typing) return;
  clearTimeout(S.timer);
  S.typing = false;
  const sc = SCENES[S.scene];
  if (!sc) return;
  document.getElementById('narrative-text').innerHTML = sc.text || '';
  renderChoices(sc.choices || []);
}

// ── Render choices ──
function renderChoices(choices) {
  const area = document.getElementById('choices-area');
  area.innerHTML = '';
  if (!choices.length) return;
  setTimeout(() => {
    choices.forEach((c, idx) => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn fade-in';
      btn.style.animationDelay = (idx * 0.08) + 's';
      btn.innerHTML = `<span class="arrow">▶</span><span>${c.text}</span>`;
      btn.onclick = () => {
        S.history.push({ scene: S.scene, idx });
        if (c.flag) Object.assign(S.flags, c.flag);
        btn.style.animation = 'flash-in 0.4s ease both';
        setTimeout(() => goScene(c.next), 320);
      };
      area.appendChild(btn);
    });
  }, 120);
}

// ── Progress bar ──
function updateProgress() {
  const bar = document.getElementById('progress-bar');
  const total = 14;
  const filled = Math.min(Math.round((S.count / 22) * total), total);
  bar.innerHTML = '';
  for (let i = 0; i < total; i++) {
    const d = document.createElement('div');
    d.className = 'pdot' + (i < filled ? ' on' : '');
    bar.appendChild(d);
  }
}

// ── Path label ──
function updatePath() {
  const lbl = document.getElementById('path-label');
  const f = S.flags;
  if (f.vindicated)                    { lbl.textContent = 'Justice Served';          lbl.style.color = '#f0a800'; }
  else if (f.science && f.assertive)   { lbl.textContent = 'The Science Pioneer';     lbl.style.color = '#80cbc4'; }
  else if (f.science)                  { lbl.textContent = "The Educator's Path";     lbl.style.color = '#20967a'; }
  else if (f.assertive && f.independent){ lbl.textContent = 'Independent Pioneer';   lbl.style.color = '#80cbc4'; }
  else if (f.assertive)                { lbl.textContent = 'The Resolute';            lbl.style.color = '#a8d870'; }
  else                                 { lbl.textContent = 'Fate unfolds…';           lbl.style.color = '#4a7a4a'; }
}

// ── Show ending screen ──
function showEnding(endId) {
  const e = ENDS[endId];
  if (!e) return;

  const f = S.flags;
  const pathParts = [];
  if (f.assertive)   pathParts.push('Bold');
  if (f.independent) pathParts.push('Independent');
  if (f.open)        pathParts.push('Honest');
  if (f.science)     pathParts.push('Educator');
  if (f.truthful)    pathParts.push('Truthful');
  if (f.vindicated)  pathParts.push('Justice');
  const path = pathParts.join(' · ') || 'Free path';

  const game = document.getElementById('game');
  game.innerHTML = `
    <div id="header">
      <span class="game-title">CHEMISTRY</span>
      <span style="font-family:'Press Start 2P',monospace;font-size:7px;color:var(--dim)">ENDING UNLOCKED</span>
    </div>
    <div id="scene-art" class="bg-dark"
         style="height:110px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
      <div style="font-family:'Press Start 2P',monospace;font-size:clamp(14px,3vw,20px);
                  color:${e.color};text-shadow:0 0 24px ${e.color};letter-spacing:5px;text-align:center">
        ★ ENDING ★
      </div>
    </div>
    <div style="flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;align-items:center;gap:0">
      <div style="font-family:'Press Start 2P',monospace;font-size:8px;
                  color:${e.color};border:2px solid ${e.color};padding:7px 16px;
                  letter-spacing:1px;margin-bottom:12px">${e.badge}</div>
      <div style="font-family:'Press Start 2P',monospace;font-size:clamp(9px,1.8vw,13px);
                  color:#fff;line-height:1.9;margin:8px 0 14px;text-align:center">${e.title}</div>
      <div style="font-size:19px;line-height:1.7;color:var(--text);max-width:580px;
                  margin:0 auto 14px;text-align:left">${e.desc}</div>
      <div style="font-size:17px;font-style:italic;border-left:3px solid ${e.color};
                  color:${e.color};padding:8px 14px;text-align:left;
                  max-width:560px;width:100%;margin:6px auto 14px;line-height:1.7">${e.quote}</div>
      <div style="font-size:15px;color:#3a6a3a;line-height:2;margin-bottom:14px">
        Choices made: ${S.history.length} &nbsp;·&nbsp; Path: ${path}
      </div>
      <button onclick="location.reload()"
              style="font-family:'Press Start 2P',monospace;font-size:8px;
                     background:transparent;border:2px solid var(--border);
                     color:var(--text);padding:12px 22px;cursor:pointer;
                     letter-spacing:2px;margin-top:6px;
                     transition:border-color 0.15s,color 0.15s"
              onmouseover="this.style.borderColor='${e.color}';this.style.color='${e.color}'"
              onmouseout="this.style.borderColor='';this.style.color=''">
        ↺ Play Again  ·  Discover Other Endings
      </button>
    </div>
    <div id="status-bar">
      <span>Game Over</span>
      <span style="color:${e.color}">${e.badge}</span>
    </div>
  `;
}

// ══════════════════════════════════════════════════════════════
// INTERACTIVE EFFECTS
// ══════════════════════════════════════════════════════════════

const SCENE_FX = {
  lab_morning:     'papers',
  confront:        'papers',
  confront_result: 'papers',
  calvins_death:   'red-on',
  aftermath:       'red-off',
  tell_truth:      'tears',
};

function triggerEffect(id) {
  const fx = SCENE_FX[id];
  if (!fx) return;
  if (fx === 'papers')  setTimeout(effectPapers,  300);
  if (fx === 'red-on')  setTimeout(effectRedOn,    80);
  if (fx === 'red-off') effectRedOff();
  if (fx === 'tears')   setTimeout(effectTears,   600);
}

// ── Paper bombing ──
const PAPER_CONTENT = [
  "╔══════════╗\n║ REPORT   ║\n║ #447     ║\n║ UNSIGNED ║\n╚══════════╝",
  "╔══════════╗\n║ FILED BY ║\n║ DONATTI  ║\n║ ──────── ║\n╚══════════╝",
  "╔══════════╗\n║ DATA     ║\n║ YIELD    ║\n║ 67.3%    ║\n╚══════════╝",
  "╔══════════╗\n║ AUTHOR:  ║\n║ [REDACT] ║\n║ ──────── ║\n╚══════════╝",
  "╔══════════╗\n║ NOTE:    ║\n║ NAME     ║\n║ REMOVED  ║\n╚══════════╝",
  "╔══════════╗\n║ SUBMIT   ║\n║ TO:      ║\n║ DONATTI  ║\n╚══════════╝",
  "╔══════════╗\n║ DRAFT    ║\n║ v0.3     ║\n║ UNSIGNED ║\n╚══════════╝",
  "╔══════════╗\n║ RESULT   ║\n║ ──────── ║\n║ DENIED   ║\n╚══════════╝",
  "╔══════════╗\n║ FILE     ║\n║ #003     ║\n║ CLOSED   ║\n╚══════════╝",
  "╔══════════╗\n║ SIGNED:  ║\n║ ──────── ║\n║  ???     ║\n╚══════════╝",
];

function effectPapers() {
  const layer = document.getElementById('fx-layer');
  const game  = document.getElementById('game');
  const gRect = game.getBoundingClientRect();
  const cx = gRect.left + gRect.width  / 2;
  const cy = gRect.top  + gRect.height / 2;

  for (let i = 0; i < 11; i++) {
    const el = document.createElement('div');
    el.className = 'paper';
    el.textContent = PAPER_CONTENT[i % PAPER_CONTENT.length];
    layer.appendChild(el);

    // Start from a random edge
    const edge = i % 4;
    let sx, sy;
    if      (edge === 0) { sx = gRect.left + Math.random() * gRect.width;  sy = gRect.top  - 70; }
    else if (edge === 1) { sx = gRect.left + Math.random() * gRect.width;  sy = gRect.bottom + 70; }
    else if (edge === 2) { sx = gRect.left - 80;  sy = gRect.top + Math.random() * gRect.height; }
    else                 { sx = gRect.right + 80; sy = gRect.top + Math.random() * gRect.height; }

    // Land near center with scatter
    const tx = cx + (Math.random() - 0.5) * gRect.width  * 0.7;
    const ty = cy + (Math.random() - 0.5) * gRect.height * 0.5;
    const r0 = (Math.random() - 0.5) * 30;
    const r1 = (Math.random() - 0.5) * 260;
    const dur   = 2200 + Math.random() * 1000;
    const delay = i * 110;

    const anim = el.animate([
      { opacity: 0,   transform: `translate(${sx}px,${sy}px) rotate(${r0}deg) scale(0.5)` },
      { opacity: 1,   transform: `translate(${sx}px,${sy}px) rotate(${r0}deg) scale(0.8)`, offset: 0.06 },
      { opacity: 1,   transform: `translate(${tx}px,${ty}px) rotate(${r1}deg) scale(1)`,   offset: 0.55 },
      { opacity: 0.9, transform: `translate(${tx}px,${ty}px) rotate(${r1}deg) scale(1)`,   offset: 0.78 },
      { opacity: 0,   transform: `translate(${tx}px,${ty+60}px) rotate(${r1}deg) scale(0.9)` },
    ], { duration: dur, delay, easing: 'ease-out', fill: 'both' });

    anim.onfinish = () => el.remove();
  }

  // Screen shake when first papers land (~550ms in)
  setTimeout(() => {
    game.classList.add('shaking');
    setTimeout(() => game.classList.remove('shaking'), 500);
  }, 550);
}

// ── Red screen ──
function effectRedOn() {
  const veil = document.getElementById('red-veil');
  veil.classList.add('on');
  setTimeout(() => veil.classList.add('pulse'), 2500);
}

function effectRedOff() {
  const veil = document.getElementById('red-veil');
  veil.classList.remove('on', 'pulse');
}

// ── Tears ──
function effectTears() {
  const layer = document.getElementById('fx-layer');
  const game  = document.getElementById('game');
  const gRect = game.getBoundingClientRect();
  game.classList.add('scene-tears');

  for (let i = 0; i < 30; i++) {
    const el = document.createElement('div');
    el.className = 'tear';
    const x   = gRect.left + (0.15 + Math.random() * 0.70) * gRect.width;
    const h   = 8 + Math.random() * 16;
    const dur = 2000 + Math.random() * 1800;
    const dly = Math.random() * 2000;
    el.style.height = h + 'px';
    layer.appendChild(el);

    const anim = el.animate([
      { opacity: 0,   transform: `translate(${x}px, ${gRect.top - h}px) scaleY(0.5)` },
      { opacity: 0.9, transform: `translate(${x}px, ${gRect.top + 10}px) scaleY(1.1)`, offset: 0.06 },
      { opacity: 0.7, transform: `translate(${x}px, ${gRect.bottom - 40}px) scaleY(1)`, offset: 0.88 },
      { opacity: 0,   transform: `translate(${x}px, ${gRect.bottom + 20}px) scaleY(0.8)` },
    ], { duration: dur, delay: dly, easing: 'ease-in', fill: 'both' });

    anim.onfinish = () => el.remove();
  }
}

// ── Click anywhere to skip typewriter ──
document.addEventListener('click', e => {
  if (e.target.closest('.choice-btn')) return;
  skipTyping();
});

// ── Title fade-in on load ──
window.addEventListener('load', () => {
  const ts = document.getElementById('title-screen');
  ts.style.opacity = '0';
  ts.style.transition = 'opacity 1.2s';
  setTimeout(() => { ts.style.opacity = '1'; }, 80);
});
</script>
